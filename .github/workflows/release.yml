name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: swift build -c release

      - name: Run tests
        run: swift test

      - name: Create app bundle
        run: make bundle

      - name: Create release archive
        run: |
          mkdir -p dist
          ditto -c -k --keepParent Stash.app dist/Stash-${{ steps.version.outputs.VERSION }}.zip

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes

      - name: Update Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          SHA256=$(shasum -a 256 dist/Stash-${VERSION}.zip | cut -d ' ' -f 1)
          git clone https://x-access-token:${TAP_TOKEN}@github.com/msjurset/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          sed -i '' "s|version \".*\"|version \"${VERSION}\"|" Casks/stash-mac.rb
          sed -i '' "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Casks/stash-mac.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/stash-mac.rb
          git commit -m "stash-mac ${VERSION}"
          git push
